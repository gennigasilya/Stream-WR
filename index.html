function parseSheetRows(rows) {
  const dataRows = rows.slice(2); // skip blank spacer row + header row
  const entries = [];
  let currentDate = null;
  let idc = 1;
  for (const row of dataRows) {
    const dateRaw = (row[0] || "").trim();
    const time = (row[1] || "").trim();
    const game = (row[2] || "").trim();
    let streamer = (row[4] || "").trim();
    if (dateRaw) currentDate = dateRaw;
    streamer = SHEET_NAME_FIX[streamer] || streamer;
    if (!time || !game) continue;
    const mapped = SHEET_GAME_CODE_MAP[game] || game;
    entries.push({ id: idc++, date: currentDate, time, game: mapped, streamer, pic: "" });
  }
  return entries.filter((e) => e.streamer);
}

async function fetchSheetSchedule() {
  const res = await fetch(SHEET_CSV_URL);
  if (!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();
  const parsed = Papa.parse(text, { skipEmptyLines: false });
  const entries = parseSheetRows(parsed.data);
  if (entries.length === 0) throw new Error("no rows parsed");
  const dateRe = /^\d{2}\/\d{2}\/\d{4}$/;
  const validDateCount = entries.filter((e) => dateRe.test(e.date || "")).length;
  if (validDateCount < entries.length * 0.9) {
    throw new Error("รูปแบบวันที่จากชีทเปลี่ยนไป (ไม่ตรง DD/MM/YYYY) — ยกเลิกการซิงค์เพื่อป้องกันตารางว่าง");
  }
  return entries;
}

function mergeCarryOverPic(newEntries, oldEntries) {
  const picLookup = {};
  (oldEntries || []).forEach((e) => {
    const key = e.date + "|" + e.time + "|" + e.streamer.trim().toLowerCase();
    if (e.pic) picLookup[key] = e.pic;
  });
  return newEntries.map((e) => {
    const key = e.date + "|" + e.time + "|" + e.streamer.trim().toLowerCase();
    return picLookup[key] ? { ...e, pic: picLookup[key] } : e;
  });
}

function driveImageUrl(idOrUrl) {
  if (!idOrUrl) return null;
  let id = idOrUrl.trim();
  const m = id.match(/\/d\/([a-zA-Z0-9_-]{10,})/) || id.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if (m) id = m[1];
  if (!/^[a-zA-Z0-9_-]{10,}$/.test(id)) return null;
  return `https://lh3.googleusercontent.com/d/${id}=w300`;
}

function parseDMY(d) {
  const [dd, mm, yyyy] = d.split("/").map(Number);
  return new Date(yyyy, mm - 1, dd);
}
function fmtDMY(date) {
  const dd = String(date.getDate()).padStart(2, "0");
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  return `${dd}/${mm}/${date.getFullYear()}`;
}
function fmtMoney(n) {

function timeStart(t) {

function timeToMin(hm) {
  const [h, m] = hm.trim().split(".").map(Number);
  return (h || 0) * 60 + (m || 0);
}
function parseTimeRange(t) {
  const [a, b] = t.split("-").map((s) => s.trim());
  let start = timeToMin(a);
  let end = timeToMin(b);
  if (end <= start) end += 24 * 60;
  return [start, end];
}
function rangesOverlap(t1, t2) {
  try {
    const [s1, e1] = parseTimeRange(t1);
    const [s2, e2] = parseTimeRange(t2);
    return s1 < e2 && s2 < e1;
  } catch (e) {
    return false;
  }
}

async function storageGet(key, shared) {
  if (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function") {
    try {
      return await window.storage.get(key, shared);
    } catch (e) {
      // fall through to localStorage
    }
  }
  try {
    const raw = window.localStorage.getItem((shared ? "shared:" : "priv:") + key);
    if (raw === null) return null;
    return { key, value: raw, shared: !!shared };
  } catch (e) {
    return null;
  }
}

async function storageSet(key, value, shared) {
  if (typeof window !== "undefined" && window.storage && typeof window.storage.set === "function") {
    try {
      const res = await window.storage.set(key, value, shared);
      if (res) return res;
    } catch (e) {
      // fall through to localStorage
    }
  }
  try {
    window.localStorage.setItem((shared ? "shared:" : "priv:") + key, value);
    return { key, value, shared: !!shared };
  } catch (e) {
    return null;
  }
}

    persist("streamer_photos_v1", next, true);
  }, [persist]);

  const syncNow = React.useCallback(async () => {
    setSyncStatus("syncing");
    setSyncErrorMsg("");
    try {
      const sheetEntries = await fetchSheetSchedule();
      setSchedule((current) => {
        const merged = mergeCarryOverPic(sheetEntries, current || []);
        persist("schedule_v1", merged, false);
        return merged;
      });
      const now = new Date().toISOString();
      setLastSynced(now);
      try {
        await storageSet("last_synced_v1", now, false);
      } catch (e) {}
      setSyncStatus("success");
    } catch (e) {
      setSyncStatus("error");
      setSyncErrorMsg(String(e && e.message ? e.message : e));
    }
  }, [persist]);

  React.useEffect(() => {
    if (loaded) {
      syncNow();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loaded]);

  return {
    schedule, streamers, availability, photos, loaded,
    updateSchedule, updateStreamers, updateAvailability, updatePhotos, saveError,
    syncStatus, lastSynced, syncErrorMsg, syncNow,
  };
}

function getPrice(streamers, name) {
  const s = streamers[name] || DEFAULT_PRICE;
  const normal = s.normalPrice ?? DEFAULT_PRICE.normalPrice;
  const discount = (s.discountPrice ?? null);
  const actual = discount != null ? discount : normal;
  return { normal, discount, actual };
}

  const filteredSchedule = React.useMemo(() => {
    return gameFilter === "all" ? schedule : schedule.filter((e) => e.game === gameFilter);
  }, [schedule, gameFilter]);

  const byDate = React.useMemo(() => {
    const map = {};
    filteredSchedule.forEach((e) => {
      (map[e.date] = map[e.date] || []).push(e);
    });
    Object.values(map).forEach((arr) => arr.sort((a, b) => timeStart(a.time).localeCompare(timeStart(b.time))));
    return map;
  }, [filteredSchedule]);

  const first = new Date(year, month, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const todayStr = fmtDMY(new Date());

  const selectedEntries = selectedDay ? (byDate[selectedDay] || []) : [];

  React.useEffect(() => { setSelectedDay(null); }, [year, month]);

  const weekDates = React.useMemo(() => {
    const base = selectedDay ? parseDMY(selectedDay) : new Date(year, month, Math.min(new Date().getDate(), daysInMonth));
    const dow = base.getDay();
    const monday = new Date(base);
    monday.setDate(base.getDate() - dow);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });

function Summary({ schedule, streamers, year, month }) {

      const d = parseDMY(e.date);
      return d.getFullYear() === year && d.getMonth() === month && e.streamer;
    });
  }, [schedule, year, month]);

  const byGame = React.useMemo(() => {
    const map = {};
    GAME_ORDER.forEach((g) => map[g] = { count: 0, normal: 0, actual: 0 });
    monthEntries.forEach((e) => {
      const price = getPrice(streamers, e.streamer);
      if (!map[e.game]) map[e.game] = { count: 0, normal: 0, actual: 0 };
      map[e.game].count += 1;
      map[e.game].normal += price.normal;
      map[e.game].actual += price.actual;
    });
    return map;
  }, [monthEntries, streamers]);

  const perGameStreamers = React.useMemo(() => {
    const map = {};
    monthEntries.forEach((e) => {
      map[e.game] = map[e.game] || {};
      map[e.game][e.streamer] = (map[e.game][e.streamer] || 0) + 1;
    });
    const out = {};
    Object.entries(map).forEach(([game, counts]) => {
      out[game] = Object.entries(counts)
        .map(([name, count]) => {
          const price = getPrice(streamers, name);
          return { name, count, unitActual: price.actual, unitNormal: price.normal, total: count * price.actual };
        })
        .sort((a, b) => b.total - a.total);
    });
    return out;
  }, [monthEntries, streamers]);

  const totalNormal = Object.values(byGame).reduce((a, b) => a + b.normal, 0);
  const totalActual = Object.values(byGame).reduce((a, b) => a + b.actual, 0);
  const totalCount = Object.values(byGame).reduce((a, b) => a + b.count, 0);
  const savings = totalNormal - totalActual;

        <div className="hero-card save">
          <div className="hero-label">ประหยัดได้</div>
          <div className="hero-value">{fmtMoney(savings)}</div>
        </div>
        <div className="hero-card">
          <div className="hero-label">จำนวนคิวทั้งหมด</div>

        </div>
      </div>

      <div className="game-bars">
        {GAME_ORDER.map((g) => {
          const stat = byGame[g] || { count: 0, normal: 0, actual: 0 };

function findConflicts(availability, streamer, date, time) {

  return availability.filter((a) =>
    a.streamer.trim().toLowerCase() === streamer.trim().toLowerCase() &&
    a.date === date &&
    a.status === "unavailable" &&
    rangesOverlap(a.time, time)
  );
}

          <div className="ef-row">
            <label>เวลา</label>
            <input value={draft.time} onChange={(e) => setDraft({ ...draft, time: e.target.value })} />
          </div>
          <div className="ef-row">
            <label>เกม</label>
            <select value={draft.game} onChange={(e) => setDraft({ ...draft, game: e.target.value })}>
              {GAME_ORDER.map((g) => <option key={g} value={g}>{GAME_META[g].label}</option>)}
            </select>
          </div>
          <div className="ef-row">
            <label>ชื่อ Streamer</label>
            <input list="streamer-names" value={draft.streamer} onChange={(e) => setDraft({ ...draft, streamer: e.target.value })} />
            <datalist id="streamer-names">
              {Object.keys(streamers).map((n) => <option value={n} key={n} />)}
            </datalist>
          </div>
          <div className="ef-row">
            <label>PIC</label>
            <input value={draft.pic} onChange={(e) => setDraft({ ...draft, pic: e.target.value })} />
          </div>
          {draft.streamer && findConflicts(availability, draft.streamer, draft.date, draft.time).length > 0 && (
            <div className="conflict-warning">
              ⚠ {draft.streamer} แจ้งไม่สะดวกช่วงนี้ ({findConflicts(availability, draft.streamer, draft.date, draft.time).map((c) => c.time).join(", ")})
            </div>
          )}
          <div className="ef-actions">
            <button className="btn-primary" onClick={save}>บันทึก</button>
            <button className="btn-ghost" onClick={cancel}>ยกเลิก</button>
          </div>
        </div>
      )}

      <div className="admin-table">
        <div className="at-row at-head">
          <div>วันที่</div><div>เวลา</div><div>เกม</div><div>Streamer</div><div>PIC</div><div></div>
        </div>
        {filtered.map((e) => {
          const conflicts = findConflicts(availability, e.streamer, e.date, e.time);
          return (
            <div className={"at-row" + (conflicts.length ? " has-conflict" : "")} key={e.id}>
              <div>{e.date}</div>
              <div>{e.time}</div>
              <div><Chip game={e.game} /></div>
              <div>{e.streamer || "—"}{conflicts.length > 0 && <span className="conflict-dot" title="ไม่สะดวกช่วงนี้">⚠</span>}</div>
              <div>{e.pic || "—"}</div>
              <div className="at-actions">
                <button className="icon-btn" onClick={() => startEdit(e)}>แก้ไข</button>
                <button className="icon-btn danger" onClick={() => remove(e.id)}>ลบ</button>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && <div className="dp-empty">ไม่พบข้อมูล</div>}
      </div>
    </div>
  );
}

function AdminStreamers({ streamers, updateStreamers, photos, updatePhotos }) {
  const [query, setQuery] = React.useState("");
  const [editing, setEditing] = React.useState(null);
  const [draft, setDraft] = React.useState(null);

  const names = Object.keys(streamers).filter((n) => n.toLowerCase().includes(query.toLowerCase())).sort((a, b) => a.localeCompare(b, "th"));

  const startNew = () => { setDraft({ name: "", normalPrice: 1000, discountPrice: "", photo: "" }); setEditing("new"); };
  const startEdit = (n) => { setDraft({ name: n, normalPrice: streamers[n].normalPrice ?? 1000, discountPrice: streamers[n].discountPrice ?? "", photo: (photos && photos[n]) || "" }); setEditing(n); };
  const cancel = () => { setEditing(null); setDraft(null); };

  const save = () => {
    const next = { ...streamers };
    if (editing !== "new" && editing !== draft.name) delete next[editing];
    next[draft.name] = {
      normalPrice: Number(draft.normalPrice) || 0,
      discountPrice: draft.discountPrice === "" ? null : Number(draft.discountPrice),
    };
    updateStreamers(next);

    const nextPhotos = { ...photos };
    if (editing !== "new" && editing !== draft.name) delete nextPhotos[editing];
    if (draft.photo && draft.photo.trim()) {
      nextPhotos[draft.name] = draft.photo.trim();
    } else {
      delete nextPhotos[draft.name];
    }
    updatePhotos(nextPhotos);
    cancel();
  };

  const remove = (n) => {
    const next = { ...streamers };
    delete next[n];
    updateStreamers(next);
    const nextPhotos = { ...photos };
    delete nextPhotos[n];
    updatePhotos(nextPhotos);
  };

  return (
    <div className="admin-section">
      <div className="admin-note">รูปโปรไฟล์ที่เพิ่ม/แก้ไขที่นี่จะถูกบันทึกแบบ "แชร์" — ผู้ใช้ทุกคนที่เปิดแอปนี้จะเห็นรูปเดียวกัน</div>
      <div className="admin-toolbar">
        <input className="search" placeholder="ค้นหา Streamer..." value={query} onChange={(e) => setQuery(e.target.value)} />
        <button className="btn-primary" onClick={startNew}>+ เพิ่ม Streamer</button>
      </div>

      {editing && (
        <div className="edit-form">
          <div className="ef-row">
            <label>ชื่อ Streamer</label>
            <input value={draft.name} onChange={(e) => setDraft({ ...draft, name: e.target.value })} />
          </div>
          <div className="ef-row">
            <label>ราคาปกติ (บาท)</label>
            <input type="number" value={draft.normalPrice} onChange={(e) => setDraft({ ...draft, normalPrice: e.target.value })} />
          </div>
          <div className="ef-row">
            <label>ราคาลด (บาท, เว้นว่างถ้าไม่มี)</label>
            <input type="number" value={draft.discountPrice} onChange={(e) => setDraft({ ...draft, discountPrice: e.target.value })} />
          </div>
          <div className="ef-row">
            <label>ลิงก์รูปภาพ (Google Drive share link หรือ URL)</label>
            <input value={draft.photo} onChange={(e) => setDraft({ ...draft, photo: e.target.value })} placeholder="https://drive.google.com/file/d/.../view" />
          </div>
          {draft.photo && driveImageUrl(draft.photo) && (
            <div className="ef-row">
              <label>ตัวอย่าง</label>
              <img src={driveImageUrl(draft.photo)} alt="preview" className="photo-preview" />
            </div>
          )}
          <div className="ef-actions">
            <button className="btn-primary" onClick={save} disabled={!draft.name}>บันทึก</button>
            <button className="btn-ghost" onClick={cancel}>ยกเลิก</button>
          </div>
        </div>
      )}

      <div className="admin-table">
        <div className="at-row at-head streamer-cols-photo">
          <div></div><div>ชื่อ</div><div>ราคาปกติ</div><div>ราคาลด</div><div>ราคาใช้จริง</div><div></div>
        </div>
        {names.map((n) => {
          const s = streamers[n];
          const actual = s.discountPrice != null ? s.discountPrice : s.normalPrice;
          return (
            <div className="at-row streamer-cols-photo" key={n}>
              <div><Avatar name={n} photos={photos} size={30} /></div>
              <div>{n}</div>
              <div>{fmtMoney(s.normalPrice ?? 0)}</div>
              <div>{s.discountPrice != null ? fmtMoney(s.discountPrice) : "—"}</div>
              <div className="accent-text">{fmtMoney(actual)}</div>
              <div className="at-actions">
                <button className="icon-btn" onClick={() => startEdit(n)}>แก้ไข</button>
                <button className="icon-btn danger" onClick={() => remove(n)}>ลบ</button>
              </div>
            </div>
          );
        })}
        {names.length === 0 && <div className="dp-empty">ไม่พบข้อมูล</div>}
      </div>
    </div>
  );
}

function AdminAvailability({ availability, updateAvailability, streamers }) {
  const [query, setQuery] = React.useState("");
  const [editing, setEditing] = React.useState(null);
  const [draft, setDraft] = React.useState(null);

  const blank = () => ({
    id: Date.now(),
    streamer: "",
    date: fmtDMY(new Date()),
    time: "14.00 - 23.30",
    status: "available",
    note: "",
  });

  const startNew = () => { setDraft(blank()); setEditing("new"); };
  const startEdit = (a) => { setDraft({ ...a }); setEditing(a.id); };
  const cancel = () => { setEditing(null); setDraft(null); };

  const save = () => {
    if (editing === "new") {
      updateAvailability([...availability, draft]);
    } else {
      updateAvailability(availability.map((a) => (a.id === editing ? draft : a)));
    }
    cancel();
  };
  const remove = (id) => updateAvailability(availability.filter((a) => a.id !== id));

  const filtered = availability
    .filter((a) => a.streamer.toLowerCase().includes(query.toLowerCase()))
    .sort((a, b) => parseDMY(a.date) - parseDMY(b.date) || timeStart(a.time).localeCompare(timeStart(b.time)));

  return (
    <div className="admin-section">
      <div className="admin-note">บันทึกวันและช่วงเวลาที่ Streamer แต่ละคน "สะดวก" หรือ "ไม่สะดวก" รับงาน ระบบจะเตือนอัตโนมัติเมื่อจัดคิวไลฟ์ทับช่วงที่ไม่สะดวก</div>
      <div className="admin-toolbar">
        <input className="search" placeholder="ค้นหาชื่อ Streamer..." value={query} onChange={(e) => setQuery(e.target.value)} />
        <button className="btn-primary" onClick={startNew}>+ เพิ่มช่วงเวลา</button>
      </div>

      {editing && (
        <div className="edit-form">
          <div className="ef-row">
            <label>ชื่อ Streamer</label>
            <input list="streamer-names-av" value={draft.streamer} onChange={(e) => setDraft({ ...draft, streamer: e.target.value })} />
            <datalist id="streamer-names-av">
              {Object.keys(streamers).map((n) => <option value={n} key={n} />)}
            </datalist>
          </div>
          <div className="ef-row">
            <label>วันที่ (DD/MM/YYYY)</label>
            <input value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} />
          </div>
          <div className="ef-row">
            <label>ช่วงเวลา (เช่น 14.00 - 18.00)</label>
            <input value={draft.time} onChange={(e) => setDraft({ ...draft, time: e.target.value })} />
          </div>
          <div className="ef-row">
            <label>สถานะ</label>
            <select value={draft.status} onChange={(e) => setDraft({ ...draft, status: e.target.value })}>
              <option value="available">สะดวก</option>
              <option value="unavailable">ไม่สะดวก</option>
            </select>
          </div>
          <div className="ef-row" style={{ gridColumn: "1 / -1" }}>
            <label>หมายเหตุ</label>
            <input value={draft.note} onChange={(e) => setDraft({ ...draft, note: e.target.value })} placeholder="เช่น ติดเรียน, ทำงานประจำ, ว่างตลอด" />
          </div>
          <div className="ef-actions">
            <button className="btn-primary" onClick={save} disabled={!draft.streamer}>บันทึก</button>
            <button className="btn-ghost" onClick={cancel}>ยกเลิก</button>
          </div>
        </div>
      )}

      <div className="admin-table">
        <div className="at-row at-head av-cols">
          <div>Streamer</div><div>วันที่</div><div>ช่วงเวลา</div><div>สถานะ</div><div>หมายเหตุ</div><div></div>
        </div>
        {filtered.map((a) => (
          <div className="at-row av-cols" key={a.id}>
            <div>{a.streamer}</div>
            <div>{a.date}</div>
            <div>{a.time}</div>
            <div>
              <span className={"avail-badge " + a.status}>{a.status === "available" ? "สะดวก" : "ไม่สะดวก"}</span>
            </div>
            <div className="av-note">{a.note || "—"}</div>
            <div className="at-actions">
              <button className="icon-btn" onClick={() => startEdit(a)}>แก้ไข</button>
              <button className="icon-btn danger" onClick={() => remove(a.id)}>ลบ</button>
            </div>
          </div>
        ))}
        {filtered.length === 0 && <div className="dp-empty">ยังไม่มีข้อมูลความสะดวก</div>}
      </div>
    </div>
  );
}

function AdminPage({ streamers, updateStreamers, photos, updatePhotos, availability, updateAvailability }) {
  const [sub, setSub] = React.useState("streamers");
  return (
    <div className="page">
      <div className="page-title">หลังบ้าน (Admin)</div>
      <div className="sub-tabs">
        <button className={sub === "streamers" ? "sub-tab active" : "sub-tab"} onClick={() => setSub("streamers")}>List Streamer</button>
        <button className={sub === "availability" ? "sub-tab active" : "sub-tab"} onClick={() => setSub("availability")}>ช่วงเวลาสะดวก</button>
      </div>
      {sub === "streamers" && <AdminStreamers streamers={streamers} updateStreamers={updateStreamers} photos={photos} updatePhotos={updatePhotos} />}
      {sub === "availability" && <AdminAvailability availability={availability} updateAvailability={updateAvailability} streamers={streamers} />}
    </div>
  );
}

function SyncBar({ syncStatus, lastSynced, syncErrorMsg, syncNow }) {
  const fmtTime = (iso) => {
    if (!iso) return "ยังไม่เคยซิงค์";
    const d = new Date(iso);
    return d.toLocaleString("th-TH", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
  };
  return (
    <div className={"sync-bar " + syncStatus}>
      <span className="sync-dot" />
      <span className="sync-text">
        {syncStatus === "syncing" && "กำลังซิงค์ข้อมูลจาก Google Sheet..."}
        {syncStatus === "success" && `ซิงค์ล่าสุดจาก Google Sheet: ${fmtTime(lastSynced)}`}
        {syncStatus === "error" && `ซิงค์ไม่สำเร็จ (ใช้ข้อมูลที่บันทึกไว้ล่าสุด: ${fmtTime(lastSynced)}) — ตรวจสอบว่าชีทแชร์เป็น "ทุกคนที่มีลิงก์ดูได้" แล้วลองใหม่`}
        {syncStatus === "idle" && "รอซิงค์ข้อมูล..."}
      </span>
      <button className="sync-btn" onClick={syncNow} disabled={syncStatus === "syncing"}>ซิงค์ตอนนี้</button>
    </div>
  );
}

function App() {
  const {
    schedule, streamers, availability, photos, loaded,
    updateStreamers, updateAvailability, updatePhotos, saveError,
    syncStatus, lastSynced, syncErrorMsg, syncNow,
  } = useStorage();
  const [tab, setTab] = React.useState("dashboard");
  const [year, setYear] = React.useState(2026);
  const [month, setMonth] = React.useState(6);

  if (!loaded) {
    return (
      <div className="app-shell">
        <style>{APP_CSS}</style>
        <div className="loading">กำลังโหลดข้อมูล...</div>
      </div>
    );
  }

  return (
    <div className="app-shell">
      <style>{APP_CSS}</style>
      <TopNav tab={tab} setTab={setTab} />
      <SyncBar syncStatus={syncStatus} lastSynced={lastSynced} syncErrorMsg={syncErrorMsg} syncNow={syncNow} />
      {saveError && <div className="save-warning">⚠ ไม่สามารถบันทึกข้อมูลอัตโนมัติได้ในขณะนี้ การแก้ไขอาจไม่ถูกบันทึกถาวร</div>}
      <div className="content">
        {tab === "dashboard" && (
          <Dashboard schedule={schedule} streamers={streamers} year={year} month={month} setYear={setYear} setMonth={setMonth} />
        )}
        {tab === "streamers" && <StreamersPage schedule={schedule} streamers={streamers} availability={availability} photos={photos} year={year} month={month} />}
        {tab === "summary" && <Summary schedule={schedule} streamers={streamers} year={year} month={month} />}
        {tab === "admin" && (
          <AdminPage streamers={streamers} updateStreamers={updateStreamers} photos={photos} updatePhotos={updatePhotos} availability={availability} updateAvailability={updateAvailability} />
        )}
      </div>
    </div>
  );
}



const rootEl = document.getElementById('root');
if (window.ReactDOM.createRoot) {
  ReactDOM.createRoot(rootEl).render(<App />);
} else {
  ReactDOM.render(<App />, rootEl);
}

</script>
</body>
</html>
