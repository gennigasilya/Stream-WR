<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamer Schedule &amp; Budget Manager</title>
<style>
:root {
  --bg: #faf6f0;
  --panel: #ffffff;
  --panel-2: #f4ece0;
  --border: #e4d6c3;
  --text: #3a2b1e;
  --text-dim: #8a7561;
  --accent: #8b5e3c;
  --accent-2: #6f4a2e;
  --danger: #c0392b;
  --warning: #b8860b;
  --success: #2f7d4f;
  --radius: 10px;
  font-family: -apple-system, "Segoe UI", "Noto Sans Thai", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(139, 94, 60, 0.08);
  position: sticky;
  top: 0;
  z-index: 20;
}

header.topbar h1 {
  font-size: 18px;
  margin: 0;
  font-weight: 700;
}

nav.tabs {
  display: flex;
  gap: 6px;
}

nav.tabs a {
  color: var(--text-dim);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s, color 0.15s;
}
nav.tabs a:hover { background: var(--panel-2); color: var(--text); }
nav.tabs a.active { background: var(--accent); color: white; }

main {
  padding: 20px 24px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 1px 2px rgba(139, 94, 60, 0.05);
}

.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.row.between { justify-content: space-between; }
.spacer { flex: 1; }

button, .btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}
button:hover, .btn:hover { background: var(--accent-2); }
button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
button.secondary:hover { background: #262b34; }
button.danger { background: var(--danger); }
button.small { padding: 5px 10px; font-size: 12px; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

input, select, textarea {
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 13px;
  font-family: inherit;
}
input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); }
label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; }
.field { display: flex; flex-direction: column; gap: 2px; }

h2 { font-size: 16px; margin: 0 0 12px; }
h3 { font-size: 14px; margin: 0 0 8px; }

/* ---------- Calendar ---------- */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-title { font-size: 18px; font-weight: 700; }
.view-toggle { display: flex; gap: 4px; background: var(--panel-2); padding: 3px; border-radius: 8px; }
.view-toggle button { background: transparent; color: var(--text-dim); padding: 6px 12px; }
.view-toggle button.active { background: var(--accent); color: white; }

.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; font-size: 12px; color: var(--text-dim); }
.legend .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.legend .status-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; margin-right: 5px; vertical-align: -2px; }

.game-filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.game-filter-chip {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.game-filter-chip[data-game-filter=""] { color: var(--text-dim); border-color: var(--border); }
.game-filter-chip[data-game-filter=""].active { background: var(--accent); border-color: var(--accent); color: white; }

.live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
.live-tile { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 1px 2px rgba(139, 94, 60, 0.05); }
.live-tile-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-left: 4px solid var(--accent); font-size: 14px; }
.live-open-link { margin-left: auto; font-size: 12px; color: var(--text-dim); text-decoration: none; }
.live-open-link:hover { color: var(--accent); }
.live-embed-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
.live-embed-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.live-embed-wrap.live-placeholder { background: linear-gradient(160deg, var(--panel-2), var(--panel)); }
.live-placeholder-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; text-align: center; padding: 16px; }
.live-placeholder-icon { font-size: 32px; opacity: 0.6; }
.live-placeholder-title { font-weight: 700; color: var(--text); font-size: 14px; }
.live-placeholder-next { color: var(--text-dim); font-size: 12px; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-dow { text-align: center; font-size: 11px; color: var(--text-dim); padding-bottom: 4px; font-weight: 600; }
.cal-cell {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 92px;
  padding: 6px;
  cursor: pointer;
  transition: border-color 0.15s;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cal-cell:hover { border-color: var(--accent); }
.cal-cell.empty { background: transparent; border: none; cursor: default; }
.cal-cell.status-no_live { border-color: var(--danger); background: rgba(239,68,68,0.08); }
.cal-cell .date-num { font-size: 12px; font-weight: 700; color: var(--text-dim); }
.cal-cell.today { border: 2px solid var(--accent-2); background: rgba(111,74,46,0.1); }
.cal-cell.today .date-num { color: var(--accent-2); font-weight: 800; }
.cal-cell .badges { display: flex; flex-wrap: wrap; gap: 3px; }
.cal-cell .cal-names { display: flex; flex-direction: column; gap: 2px; }
.cal-cell .cal-name-item { font-size: 11px; color: var(--text); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-cell .cal-name-item.tournament { color: var(--warning); font-weight: 700; }
.cal-cell .cal-name-empty { font-size: 11px; color: var(--text-dim); }
.game-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  color: white;
  font-weight: 700;
  white-space: nowrap;
}
.status-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
.status-tag.no_live { color: var(--danger); }
.status-tag.tournament { color: var(--warning); }

.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; align-items: start; }
.week-col { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 8px; cursor: pointer; min-height: 100px; transition: border-color 0.15s; }
.week-col:hover { border-color: var(--accent); }
.week-col.status-no_live { border-color: var(--danger); background: rgba(192,57,43,0.06); }
.week-col.today { border: 2px solid var(--accent-2); background: rgba(111,74,46,0.08); }
.week-col.today .week-col-header { color: var(--accent-2); font-weight: 800; }
.week-col-header { display: flex; flex-direction: column; gap: 2px; font-weight: 700; font-size: 13px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.week-event {
  background: var(--panel);
  border-left: 4px solid var(--accent);
  border-radius: 4px;
  padding: 6px 8px;
  margin-bottom: 6px;
  font-size: 12px;
}
.week-event .we-time { color: var(--text-dim); font-size: 10px; }
.week-event .we-game { font-weight: 700; font-size: 12px; margin-top: 1px; }
.week-event .we-streamer { font-weight: 600; color: var(--text); margin-top: 2px; }
.week-event .we-tournament-tag { font-size: 10px; color: var(--warning); font-weight: 700; margin-top: 3px; }


/* ---------- Modal ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px; overflow-y: auto; z-index: 100;
}
.modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; width: 100%; max-width: 560px;
}
.modal-close { background: transparent; color: var(--text-dim); font-size: 18px; padding: 4px 8px; }
.modal-close:hover { background: var(--panel-2); }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
th { color: var(--text-dim); font-weight: 600; font-size: 12px; }
tr:last-child td { border-bottom: none; }

.session-row {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.session-row:last-child { border-bottom: none; }
.session-row.is-tournament { background: rgba(184,134,11,0.06); }
.session-row-main {
  display: grid;
  grid-template-columns: 74px 76px 26px minmax(0, 1fr) 28px 64px;
  align-items: center;
  gap: 8px;
}
.session-row .time { color: var(--text-dim); font-size: 12px; }
.session-row .streamer-link { color: var(--text); font-weight: 600; text-decoration: none; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-row .streamer-link:hover { color: var(--accent); }
.session-row-sub {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--text-dim);
  padding-left: 208px;
  margin-top: 2px;
}
.session-row .price { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-dim); font-size: 12px; }
.session-row .price.free { color: var(--warning); font-weight: 700; }

.tour-icon-toggle {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  opacity: 0.45;
  font-size: 13px;
  line-height: 1;
  padding: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.tour-icon-toggle:hover { opacity: 1; border-color: var(--warning); }
.tour-icon-toggle.active { opacity: 1; background: var(--warning); border-color: var(--warning); color: white; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; color: white; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.stat-tile { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.stat-tile .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
.stat-tile .value { font-size: 22px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
.stat-tile.savings .value { color: var(--success); }

.streamer-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.avatar-circle { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; overflow: hidden; flex-shrink: 0; }
.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
.avatar-circle.large { width: 72px; height: 72px; font-size: 24px; }
.avatar-circle.tiny { width: 26px; height: 26px; font-size: 11px; }

.photo-upload-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.photo-upload-row .field { flex: 1; }
.photo-upload-row input[type="file"] { font-size: 12px; }

tr.editor-row td { padding: 0; }
.editor-card { margin: 0; border-radius: 0; border-left: none; border-right: none; border-top: 2px solid var(--accent); background: var(--panel-2); }

.avail-day-row { display: flex; gap: 6px; flex-wrap: wrap; }
.avail-day-chip { background: rgba(192,57,43,0.08); border: 1px solid var(--danger); color: var(--danger); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
.avail-day-chip.active { background: var(--success); border-color: var(--success); color: white; }

.empty-state { text-align: center; color: var(--text-dim); padding: 30px; font-size: 13px; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--panel-2); border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 200; }

.month-select { display: flex; align-items: center; gap: 8px; }

details.game-summary { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; padding: 10px 14px; }
details.game-summary summary { cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 8px; list-style: none; }
details.game-summary summary::-webkit-details-marker { display: none; }
details.game-summary .gs-totals { margin-left: auto; display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); font-weight: 400; }

.admin-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.admin-tabs button { background: var(--panel-2); color: var(--text-dim); border: 1px solid var(--border); }
.admin-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }

.color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(255,255,255,0.2); }

@media (max-width: 700px) {
  header.topbar { flex-direction: column; align-items: flex-start; gap: 10px; }
  .cal-grid { gap: 3px; }
  .cal-cell { min-height: 64px; padding: 4px; }
  main { padding: 14px; }
  .week-grid { grid-template-columns: repeat(7, 130px); overflow-x: auto; padding-bottom: 8px; }
}

</style>
</head>

const Util = (() => {
  function fmtMoney(n) {
    return Number(n || 0).toLocaleString("th-TH", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }
  function pad2(n) { return String(n).padStart(2, "0"); }
  function toISODate(y, m, d) { return `${y}-${pad2(m)}-${pad2(d)}`; }
  function parseISODate(s) {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
  }
  const MONTH_NAMES_TH = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const DOW_TH = ["อา","จ","อ","พ","พฤ","ศ","ส"];
  const TIME_SLOTS = [
    { key: "afternoon", label: "บ่าย" },
    { key: "evening", label: "เย็น" },
    { key: "night", label: "ดึก" },
  ];
  const AVAIL_DAYS = [
    { key: "mon", label: "จ" },
    { key: "tue", label: "อ" },
    { key: "wed", label: "พ" },
    { key: "thu", label: "พฤ" },
    { key: "fri", label: "ศ" },
    { key: "sat", label: "ส" },
    { key: "sun", label: "อา" },
  ];
  function escapeHtml(str) {
    return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  // "Today" is always computed in Thailand time (Asia/Bangkok, UTC+7), regardless of the
  // viewer's own device timezone, so the highlighted date matches Thailand's clock.
  function todayISO() {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Bangkok", year: "numeric", month: "2-digit", day: "2-digit",
    }).formatToParts(new Date());
    const y = parts.find((p) => p.type === "year").value;
    const m = parts.find((p) => p.type === "month").value;
    const d = parts.find((p) => p.type === "day").value;
    return `${y}-${m}-${d}`;
  }
  function avatarHTML(streamer, sizeClass) {
    const cls = "avatar-circle" + (sizeClass ? " " + sizeClass : "");
    if (streamer && streamer.photo) {
      return `<div class="${cls}"><img src="${streamer.photo}" alt="${escapeHtml(streamer.name)}"></div>`;
    }
    const initials = streamer ? streamer.name.slice(0, 2).toUpperCase() : "?";
    return `<div class="${cls}">${escapeHtml(initials)}</div>`;
  }
  function showToast(msg) {
    const root = document.getElementById("toast-root");
    root.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
    setTimeout(() => { root.innerHTML = ""; }, 2200);
  }
  function openModal(html) {
    const root = document.getElementById("modal-root");
    root.innerHTML = `<div class="modal-backdrop" id="modal-backdrop"><div class="modal">${html}</div></div>`;
    document.getElementById("modal-backdrop").addEventListener("click", (e) => {
      if (e.target.id === "modal-backdrop") closeModal();
    });
  }
  function closeModal() {
    document.getElementById("modal-root").innerHTML = "";
  }
  return { fmtMoney, pad2, toISODate, parseISODate, MONTH_NAMES_TH, DOW_TH, TIME_SLOTS, AVAIL_DAYS, escapeHtml, todayISO, avatarHTML, showToast, openModal, closeModal };
})();


// Data layer: localStorage-backed store, seeded from data/seed.json on first run.
const DB = (() => {
  const STORAGE_KEY = "streamer_manager_db_v1";
  const SHEET_ID = "1WmWYWnrkjyxzAbUoGU9sv7FYonnWlWwswtBufposvXQ";
  // One entry per month tab in the sheet. Add a new { name, gid } here whenever a new month tab
  // is created (open the tab in Google Sheets, copy the gid=... number from the URL).
  const SHEET_MONTH_TABS = [
    { name: "กรกฎาคม 2569", gid: 0 },
    { name: "สิงหาคม 2569", gid: 2081502206 },
    { name: "กันยายน 2569", gid: 1965405291 },
    { name: "ตุลาคม 2569", gid: 929378145 },
    { name: "พฤศจิกายน 2569", gid: 1192033499 },
    { name: "ธันวาคม 2569", gid: 1508262743 },
  ];
  function sheetCsvUrl(gid) {
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  }
  let state = null;

  function splitCSVLine(line) {
    const result = [];
    let cur = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (inQuotes) {
        if (c === '"') {
          if (line[i + 1] === '"') { cur += '"'; i++; } else inQuotes = false;
        } else cur += c;
      } else if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        result.push(cur);
        cur = "";
      } else {
        cur += c;
      }
    }
    result.push(cur);
    return result;
  }

  function mapSheetGameId(raw) {
    const t = (raw || "").trim();
    if (/^TOSM$/.test(t)) return "tosm";
    if (/^Zone4/.test(t)) return "zone4";
    if (/^Cabal/.test(t)) return "cabal";
    if (/^TR$/.test(t)) return "tr";
    if (/^WARZ$/.test(t)) return "warz";
    return null;
  }

  // Parses the sheet's raw CSV export into flat {date, time, gameId, streamerName, program} rows,
  // forward-filling the merged Date column the same way the original PowerShell importer did.
  function parseSheetCSV(csvText) {
    const lines = csvText.split(/\r\n|\n/).slice(2); // row1 is blank, row2 is the header row
    let currentDate = null;
    const rows = [];
    lines.forEach((line) => {
      if (line === "") return;
      const [dateRaw, time, game, program, kol] = splitCSVLine(line);
      const dateTrim = (dateRaw || "").trim();
      if (dateTrim) {
        const parts = dateTrim.split("/");
        if (parts.length === 3) {
          currentDate = `${parts[2]}-${parts[1].padStart(2, "0")}-${parts[0].padStart(2, "0")}`;
        }
      }
      if (!currentDate) return;
      const streamerName = (kol || "").trim();
      if (!streamerName) return;
      const gameId = mapSheetGameId(game);
      if (!gameId) return;
      rows.push({ date: currentDate, time: (time || "").trim(), gameId, streamerName, program: (program || "").trim() });
    });
    return rows;
  }

  function defaultState() {
    return { games: [], streamers: [], schedule: [], dayStatus: {} };
  }

  async function load() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      return state;
    }
    state = typeof SEED_DATA !== "undefined" ? JSON.parse(JSON.stringify(SEED_DATA)) : defaultState();
    save();
    return state;
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function get() {
    return state;
  }

  function uid(prefix) {
    return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // ---------- Games ----------
  function listGames() {
    return state.games;
  }
  function getGame(id) {
    return state.games.find((g) => g.id === id);
  }
  function addGame(g) {
    const game = { id: uid("g"), name: g.name, fullName: g.fullName || g.name, color: g.color || "#64748b", youtubeUrl: g.youtubeUrl || null, channelId: g.channelId || null };
    state.games.push(game);
    save();
    return game;
  }
  function updateGame(id, patch) {
    const g = getGame(id);
    if (!g) return;
    Object.assign(g, patch);
    save();
  }

  // ---------- Streamers ----------
  function listStreamers() {
    return state.streamers;
  }
  function getStreamer(id) {
    return state.streamers.find((s) => s.id === id);
  }
  function addStreamer(name) {
    const s = { id: uid("s"), name, photo: null, prices: [], availability: { timeSlots: [], days: [] } };
    state.streamers.push(s);
    save();
    return s;
  }
  function updateStreamer(id, patch) {
    const s = getStreamer(id);
    if (!s) return;
    Object.assign(s, patch);
    save();
  }
  function deleteStreamer(id) {
    state.streamers = state.streamers.filter((s) => s.id !== id);
    state.schedule = state.schedule.filter((e) => e.streamerId !== id);
    save();
  }

  // ---------- Prices (per streamer, per game) ----------
  function setPrice(streamerId, gameId, normalPrice, discountPrice) {
    const s = getStreamer(streamerId);
    if (!s) return;
    let p = s.prices.find((p) => p.gameId === gameId);
    if (!p) {
      p = { gameId, normalPrice: 0, discountPrice: null };
      s.prices.push(p);
    }
    p.normalPrice = normalPrice;
    p.discountPrice = discountPrice === "" || discountPrice === null || discountPrice === undefined ? null : discountPrice;
    save();
  }
  function deletePrice(streamerId, gameId) {
    const s = getStreamer(streamerId);
    if (!s) return;
    s.prices = s.prices.filter((p) => p.gameId !== gameId);
    save();
  }
  function getPrice(streamerId, gameId) {
    const s = getStreamer(streamerId);
    if (!s) return null;
    return s.prices.find((p) => p.gameId === gameId) || null;
  }
  // Effective price used for totals: discount price if set, otherwise normal price.
  function effectivePrice(streamerId, gameId) {
    const p = getPrice(streamerId, gameId);
    if (!p) return { normal: 0, actual: 0 };
    const normal = Number(p.normalPrice) || 0;
    const actual = p.discountPrice !== null && p.discountPrice !== undefined && p.discountPrice !== "" ? Number(p.discountPrice) : normal;
    return { normal, actual };
  }

  // ---------- Schedule ----------
  function listSchedule() {
    return state.schedule;
  }
  function listScheduleByDate(date) {
    return state.schedule.filter((e) => e.date === date);
  }
  function listScheduleByMonth(year, month) {
    const prefix = `${year}-${String(month).padStart(2, "0")}`;
    return state.schedule.filter((e) => e.date.startsWith(prefix));
  }
  function addScheduleEntry(entry) {
    const e = { id: uid("e"), date: entry.date, time: entry.time || "", gameId: entry.gameId, streamerId: entry.streamerId, program: entry.program || "", isTournament: !!entry.isTournament };
    state.schedule.push(e);
    save();
    return e;
  }
  function updateScheduleEntry(id, patch) {
    const e = state.schedule.find((e) => e.id === id);
    if (!e) return;
    Object.assign(e, patch);
    save();
  }
  function deleteScheduleEntry(id) {
    state.schedule = state.schedule.filter((e) => e.id !== id);
    save();
  }
  function setEntryTournament(id, isTournament) {
    const e = state.schedule.find((e) => e.id === id);
    if (!e) return;
    e.isTournament = isTournament;
    save();
  }

  // ---------- Day status: normal | no_live (whole day cancelled) ----------
  function getDayStatus(date) {
    return state.dayStatus[date] || "normal";
  }
  function setDayStatus(date, status) {
    if (status === "normal") {
      delete state.dayStatus[date];
    } else {
      state.dayStatus[date] = status;
    }
    save();
  }

  // Cost of a single schedule entry, accounting for day cancellation and per-entry tournament (free) status.
  function getEntryCost(entry) {
    if (getDayStatus(entry.date) === "no_live") {
      return { normal: 0, actual: 0, excluded: true, free: false };
    }
    if (entry.isTournament) {
      return { normal: 0, actual: 0, excluded: false, free: true };
    }
    const price = effectivePrice(entry.streamerId, entry.gameId);
    return { normal: price.normal, actual: price.actual, excluded: false, free: false };
  }

  // ---------- Import/Export ----------
  function exportJSON() {
    return JSON.stringify(state, null, 2);
  }
  function importJSON(json) {
    const parsed = JSON.parse(json);
    state = parsed;
    save();
  }
  function resetToSeed() {
    localStorage.removeItem(STORAGE_KEY);
    return load();
  }

  // Replaces the schedule with the given flat {date,time,gameId,streamerName,program} rows,
  // matching streamers by name so existing profiles (prices, photo, availability) are left untouched.
  // New streamer names are added; per-entry tournament (free) flags carry over when the same
  // date+time+game+streamer combination still exists in the new rows.
  function applyScheduleRows(rows) {
    const nameToId = {};
    state.streamers.forEach((s) => { nameToId[s.name] = s.id; });
    let addedStreamers = 0;
    const seenNames = new Set();
    rows.forEach((r) => {
      if (seenNames.has(r.streamerName)) return;
      seenNames.add(r.streamerName);
      if (!nameToId[r.streamerName]) {
        const created = addStreamer(r.streamerName);
        nameToId[r.streamerName] = created.id;
        addedStreamers++;
      }
    });

    const idToName = {};
    state.streamers.forEach((s) => { idToName[s.id] = s.name; });
    const oldTournamentKeys = new Set();
    state.schedule.forEach((e) => {
      if (!e.isTournament) return;
      const name = idToName[e.streamerId];
      if (!name) return;
      oldTournamentKeys.add(`${e.date}|${e.time}|${e.gameId}|${name}`);
    });

    state.schedule = rows.map((r) => {
      const key = `${r.date}|${r.time}|${r.gameId}|${r.streamerName}`;
      return {
        id: uid("e"),
        date: r.date,
        time: r.time,
        gameId: r.gameId,
        streamerId: nameToId[r.streamerName],
        program: r.program,
        isTournament: oldTournamentKeys.has(key),
      };
    });
    save();
    return { addedStreamers, newCount: state.schedule.length };
  }

  // Refreshes the schedule from the sheet snapshot embedded/bundled with this file (offline fallback).
  async function syncScheduleFromSeed() {
    let seed;
    if (typeof SEED_DATA !== "undefined") {
      seed = SEED_DATA;
    } else {
      const res = await fetch("data/seed.json");
      seed = await res.json();
    }
    const seedIdToName = {};
    seed.streamers.forEach((s) => { seedIdToName[s.id] = s.name; });
    const rows = seed.schedule.map((se) => ({
      date: se.date, time: se.time, gameId: se.gameId, streamerName: seedIdToName[se.streamerId], program: se.program,
    }));
    return applyScheduleRows(rows);
  }

  // Fetches every known month tab's CSV directly from Google Sheets (real-time) and refreshes
  // the schedule from the combined result. See SHEET_MONTH_TABS above to add new months.
  // A single tab failing (network error, or a tab whose sharing/protection settings block
  // anonymous export) doesn't abort the rest — its rows are just skipped and reported back.
  async function syncScheduleFromSheet() {
    const failedTabs = [];
    const results = await Promise.all(SHEET_MONTH_TABS.map(async (tab) => {
      try {
        const res = await fetch(sheetCsvUrl(tab.gid));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const rows = parseSheetCSV(text);
        if (!rows.length) failedTabs.push(tab.name);
        return rows;
      } catch (err) {
        failedTabs.push(tab.name);
        return [];
      }
    }));
    const rows = results.flat();
    if (!rows.length) throw new Error("ไม่พบข้อมูลในชีทเลย (ทุกแท็บดึงไม่ได้)");
    const applied = applyScheduleRows(rows);
    return { ...applied, failedTabs };
  }

  return {
    load, save, get, uid,
    listGames, getGame, addGame, updateGame,
    listStreamers, getStreamer, addStreamer, updateStreamer, deleteStreamer,
    setPrice, deletePrice, getPrice, effectivePrice,
    listSchedule, listScheduleByDate, listScheduleByMonth, addScheduleEntry, updateScheduleEntry, deleteScheduleEntry, setEntryTournament,
    getDayStatus, setDayStatus, getEntryCost,
    exportJSON, importJSON, resetToSeed, syncScheduleFromSeed, syncScheduleFromSheet,
  };
})();

// Note: this is a soft deterrent, not real security — the credentials live in this

const Auth = (() => {
  const KEY = "sm_auth_ok";
  const VALID_ID = "Critdamage";
  const VALID_PW = "CDM";

  function isAuthed() {
    return localStorage.getItem(KEY) === "1";
  }

  function logout() {
    localStorage.removeItem(KEY);
  }

  function renderLogin(container, onSuccess) {
    container.innerHTML = `
      <div class="card" style="max-width:340px;margin:60px auto 0;">
        <h2>เข้าสู่ระบบ</h2>
        <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">หน้านี้เป็นข้อมูลภายใน กรุณาเข้าสู่ระบบก่อนใช้งาน</p>
        <div class="field" style="margin-bottom:10px;">
          <label>ID</label>
          <input id="auth-id" autocomplete="username" style="width:100%;">
        </div>
        <div class="field" style="margin-bottom:10px;">
          <label>Password</label>
          <input id="auth-pw" type="password" autocomplete="current-password" style="width:100%;">
        </div>
        <div id="auth-error" style="color:var(--danger);font-size:12px;margin-bottom:10px;display:none;">ID หรือรหัสผ่านไม่ถูกต้อง</div>
        <button id="auth-submit" style="width:100%;">เข้าสู่ระบบ</button>
      </div>
    `;
    const idInput = container.querySelector("#auth-id");
    const pwInput = container.querySelector("#auth-pw");
    const errorEl = container.querySelector("#auth-error");

    const submit = () => {
      if (idInput.value.trim() === VALID_ID && pwInput.value === VALID_PW) {
        localStorage.setItem(KEY, "1");
        onSuccess();
      } else {
        errorEl.style.display = "block";
      }
    };
    container.querySelector("#auth-submit").addEventListener("click", submit);
    [idInput, pwInput].forEach((el) => el.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submit();
    }));
    idInput.focus();
  }

  return { isAuthed, logout, renderLogin };
})();


const Calendar = (() => {
  let state = { year: null, month: null, view: "month", weekAnchor: null, gameFilter: null };

  function init() {
    const today = new Date();
    if (!state.year) {
      state.year = today.getFullYear();
      state.month = today.getMonth() + 1;
      state.weekAnchor = Util.todayISO();
    }
  }

  function dayEntriesSorted(dateISO) {
    let entries = DB.listScheduleByDate(dateISO);
    if (state.gameFilter) entries = entries.filter((e) => e.gameId === state.gameFilter);
    return entries.sort((a, b) => a.time.localeCompare(b.time));
  }

  function gameBadges(dateISO) {
    const entries = dayEntriesSorted(dateISO);
    const byGame = {};
    entries.forEach((e) => {
      byGame[e.gameId] = (byGame[e.gameId] || 0) + 1;
    });
    return Object.keys(byGame).map((gid) => {
      const g = DB.getGame(gid);
      if (!g) return "";
      return `<span class="game-badge" style="background:${g.color}">${Util.escapeHtml(g.name)} ${byGame[gid]}</span>`;
    }).join("");
  }

  // When a single game is selected, list streamer names directly instead of a count badge.
  function streamerNameList(dateISO) {
    const entries = dayEntriesSorted(dateISO);
    if (!entries.length) return `<div class="cal-name-empty">—</div>`;
    return entries.map((e) => {
      const s = DB.getStreamer(e.streamerId);
      return `<div class="cal-name-item ${e.isTournament ? "tournament" : ""}">${e.isTournament ? "🏆 " : ""}${Util.escapeHtml(s ? s.name : "?")}</div>`;
    }).join("");
  }

  function renderLegend() {
    return `<div class="legend">
      <span><span class="status-swatch" style="background:rgba(239,68,68,0.35);border:1px solid var(--danger)"></span>ไม่ไลฟ์</span>
      <span><span class="status-swatch" style="background:rgba(184,134,11,0.35);border:1px solid var(--warning)"></span>🏆 มีทัวร์นาเมนต์ (ฟรี)</span>
    </div>`;
  }

  function renderGameFilter() {
    const games = DB.listGames();
    const allActive = !state.gameFilter;
    const chips = [`<button class="game-filter-chip ${allActive ? "active" : ""}" data-game-filter="">ทั้งหมด</button>`]
      .concat(games.map((g) => {
        const active = state.gameFilter === g.id;
        const style = active ? `background:${g.color};border-color:${g.color};color:#fff;` : `border-color:${g.color};color:${g.color};`;
        return `<button class="game-filter-chip" data-game-filter="${g.id}" style="${style}">${Util.escapeHtml(g.name)}</button>`;
      }));
    return `<div class="game-filter-row">${chips.join("")}</div>`;
  }

  function renderMonthGrid(year, month) {
    const firstDay = new Date(year, month - 1, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, month, 0).getDate();
    const todayISO = Util.todayISO();

    let cells = "";
    for (let i = 0; i < startWeekday; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateISO = Util.toISODate(year, month, d);
      const status = DB.getDayStatus(dateISO);
      const isToday = dateISO === todayISO ? "today" : "";
      const hasTournament = dayEntriesSorted(dateISO).some((e) => e.isTournament);
      cells += `<div class="cal-cell status-${status} ${isToday}" data-date="${dateISO}">
        <div class="date-num">${d}${status === "no_live" ? `<span class="status-tag no_live"> · ไม่ไลฟ์</span>` : hasTournament ? `<span class="status-tag tournament"> · 🏆</span>` : ""}</div>
        ${state.gameFilter
          ? `<div class="cal-names">${streamerNameList(dateISO)}</div>`
          : `<div class="badges">${gameBadges(dateISO)}</div>`}
      </div>`;
    }
    const dow = Util.DOW_TH.map((d) => `<div class="cal-dow">${d}</div>`).join("");
    return `<div class="cal-grid">${dow}${cells}</div>`;
  }

  function renderWeekGrid(anchorISO) {
    const anchor = Util.parseISODate(anchorISO);
    const startOfWeek = new Date(anchor);
    startOfWeek.setDate(anchor.getDate() - anchor.getDay());
    const todayISO = Util.todayISO();

    let cols = "";
    for (let i = 0; i < 7; i++) {
      const d = new Date(startOfWeek);
      d.setDate(startOfWeek.getDate() + i);
      const dateISO = Util.toISODate(d.getFullYear(), d.getMonth() + 1, d.getDate());
      const status = DB.getDayStatus(dateISO);
      const entries = dayEntriesSorted(dateISO);
      const isToday = dateISO === todayISO ? "today" : "";

      const events = entries.length
        ? entries.map((e) => {
            const g = DB.getGame(e.gameId);
            const s = DB.getStreamer(e.streamerId);
            return `<div class="week-event" style="border-left-color:${g ? g.color : "#999"}">
              <div class="we-time">${Util.escapeHtml(e.time)}</div>
              <div class="we-game" style="color:${g ? g.color : "var(--text)"}">${g ? Util.escapeHtml(g.fullName) : "?"}</div>
              <div class="we-streamer">${Util.escapeHtml(s ? s.name : "ไม่ระบุ")}</div>
              ${e.isTournament ? `<div class="we-tournament-tag">🏆 ทัวร์นาเมนต์ฟรี</div>` : ""}
            </div>`;
          }).join("")
        : `<div class="empty-state" style="padding:14px 4px;">— ไม่มีคิว —</div>`;

      cols += `<div class="week-col status-${status} ${isToday}" data-date="${dateISO}">
        <div class="week-col-header">
          <span>${Util.DOW_TH[d.getDay()]} ${d.getDate()}</span>
          ${status === "no_live" ? `<span class="status-tag no_live">ไม่ไลฟ์</span>` : ""}
        </div>
        ${events}
      </div>`;
    }
    return `<div class="week-grid">${cols}</div>`;
  }

  function render(container) {
    init();
    const monthTitle = `${Util.MONTH_NAMES_TH[state.month - 1]} ${state.year + 543}`;
    container.innerHTML = `
      <div class="card">
        <div class="cal-header">
          <div class="row">
            <button class="secondary small" id="cal-prev">‹</button>
            <div class="cal-title">${state.view === "month" ? monthTitle : "รายสัปดาห์"}</div>
            <button class="secondary small" id="cal-next">›</button>
            <button class="secondary small" id="cal-today">วันนี้</button>
          </div>
          <div class="row" style="gap:8px;">
            <div class="view-toggle">
              <button data-view="month" class="${state.view === "month" ? "active" : ""}">รายเดือน</button>
              <button data-view="week" class="${state.view === "week" ? "active" : ""}">รายสัปดาห์</button>
            </div>
            <button class="secondary small" id="reload-schedule" title="ดึงตารางไลฟ์สดจาก Google Sheet ตอนนี้เลย (ต้องมีอินเทอร์เน็ต) — ราคา/รูป/ช่วงเวลาที่สะดวกของ Streamer จะไม่หาย">↻ โหลดตารางไลฟ์ล่าสุด</button>
          </div>
        </div>
        ${renderGameFilter()}
        ${renderLegend()}
        ${state.view === "month" ? renderMonthGrid(state.year, state.month) : renderWeekGrid(state.weekAnchor)}
      </div>
    `;

    container.querySelectorAll("[data-date]").forEach((el) => {
      el.addEventListener("click", () => openDayModal(el.getAttribute("data-date")));
    });
    container.querySelector("#cal-prev").addEventListener("click", () => shift(-1));
    container.querySelector("#cal-next").addEventListener("click", () => shift(1));
    container.querySelector("#cal-today").addEventListener("click", () => {
      const t = new Date();
      state.year = t.getFullYear();
      state.month = t.getMonth() + 1;
      state.weekAnchor = Util.todayISO();
      render(container);
    });
    container.querySelectorAll(".view-toggle button").forEach((b) => {
      b.addEventListener("click", () => {
        state.view = b.getAttribute("data-view");
        render(container);
      });
    });
    container.querySelectorAll(".game-filter-chip").forEach((b) => {
      b.addEventListener("click", () => {
        state.gameFilter = b.getAttribute("data-game-filter") || null;
        render(container);
      });
    });
    container.querySelector("#reload-schedule").addEventListener("click", async () => {
      if (!confirm("ดึงตารางไลฟ์ล่าสุดจาก Google Sheet สดๆ มาอัปเดต?\n\nจะอัปเดตวัน/เวลา/เกม/ผู้ไลฟ์ให้ตรงกับชีทล่าสุด ส่วนราคา รูปภาพ และช่วงเวลาที่สะดวกของ Streamer ที่ตั้งค่าไว้ในหลังบ้านจะไม่หาย")) return;
      Util.showToast("กำลังดึงข้อมูลจาก Google Sheet…");
      try {
        const result = await DB.syncScheduleFromSheet();
        render(container);
        const failedNote = result.failedTabs && result.failedTabs.length ? ` — ดึงไม่ได้: ${result.failedTabs.join(", ")}` : "";
        Util.showToast(`อัปเดตจากชีทสดแล้ว (${result.newCount} คิว${result.addedStreamers ? `, เพิ่ม Streamer ใหม่ ${result.addedStreamers} คน` : ""})${failedNote}`);
      } catch (liveErr) {
        try {
          const result = await DB.syncScheduleFromSeed();
          render(container);
          Util.showToast(`ดึงชีทสดไม่ได้ (${liveErr.message}) — ใช้ข้อมูลสำรองในไฟล์แทน (${result.newCount} คิว)`);
        } catch (fallbackErr) {
          Util.showToast("โหลดข้อมูลไม่สำเร็จ: " + fallbackErr.message);
        }
      }
    });
  }

  function shift(dir) {
    if (state.view === "month") {
      state.month += dir;
      if (state.month > 12) { state.month = 1; state.year++; }
      if (state.month < 1) { state.month = 12; state.year--; }
    } else {
      const d = Util.parseISODate(state.weekAnchor);
      d.setDate(d.getDate() + dir * 7);
      state.weekAnchor = Util.toISODate(d.getFullYear(), d.getMonth() + 1, d.getDate());
    }
    render(document.getElementById("app"));
  }

  function refreshBackground() {
    const app = document.getElementById("app");
    if (app) render(app);
  }

  // Compact "normal/discount price + available days & times" line shown under each session row,
  // so admin can see it at a glance without opening the Streamer detail page.
  function sessionSubInfo(s, gameId) {
    if (!s) return "";
    const p = DB.getPrice(s.id, gameId);
    const hasDiscount = p && p.discountPrice !== null && p.discountPrice !== undefined && p.discountPrice !== "";
    const priceText = !p
      ? "ยังไม่ตั้งราคา"
      : hasDiscount
      ? `ปกติ ฿${Util.fmtMoney(p.normalPrice)} → ลด ฿${Util.fmtMoney(p.discountPrice)}`
      : `ราคา ฿${Util.fmtMoney(p.normalPrice)}`;

    const avail = s.availability || { timeSlots: [], days: [] };
    const slotLabels = Util.TIME_SLOTS.filter((t) => avail.timeSlots.includes(t.key)).map((t) => t.label);
    const dayLabels = Util.AVAIL_DAYS.filter((d) => avail.days.includes(d.key)).map((d) => d.label);
    const availText = slotLabels.length || dayLabels.length
      ? `สะดวก: ${[...slotLabels, ...dayLabels].join(" ")}`
      : "ยังไม่ระบุเวลาสะดวก";

    return `<div class="session-row-sub"><span>${Util.escapeHtml(priceText)}</span><span>${Util.escapeHtml(availText)}</span></div>`;
  }

  function openDayModal(dateISO) {
    const d = Util.parseISODate(dateISO);
    const label = `${d.getDate()} ${Util.MONTH_NAMES_TH[d.getMonth()]} ${d.getFullYear() + 543}`;
    const status = DB.getDayStatus(dateISO);
    const entries = dayEntriesSorted(dateISO);

    let rows = entries.map((e) => {
      const g = DB.getGame(e.gameId);
      const s = DB.getStreamer(e.streamerId);
      const cost = DB.getEntryCost(e);
      return `<div class="session-row ${e.isTournament ? "is-tournament" : ""}">
        <div class="session-row-main">
          <span class="badge" style="background:${g ? g.color : "#666"}">${g ? Util.escapeHtml(g.name) : "?"}</span>
          <span class="time">${Util.escapeHtml(e.time)}</span>
          ${Util.avatarHTML(s, "tiny")}
          <a class="streamer-link" data-streamer="${s ? s.id : ""}">${Util.escapeHtml(s ? s.name : "ไม่ระบุ")}</a>
          <button class="tour-icon-toggle ${e.isTournament ? "active" : ""}" data-toggle-tournament="${e.id}" title="${e.isTournament ? "ยกเลิกทัวร์นาเมนต์ (คิดเงินตามปกติ)" : "ทำเครื่องหมายว่าคนนี้มาทัวร์นาเมนต์ฟรี"}">🏆</button>
          <span class="price ${cost.free ? "free" : ""}">${cost.free ? "ฟรี" : "฿" + Util.fmtMoney(cost.actual)}</span>
        </div>
        ${sessionSubInfo(s, e.gameId)}
      </div>`;
    }).join("");
    if (!entries.length) rows = `<div class="empty-state">ไม่มีคิวไลฟ์ในวันนี้</div>`;

    const statusBanner = status === "no_live"
      ? `<div class="row" style="color:var(--danger);font-weight:700;margin-bottom:10px;">🔴 วันนี้ไม่มีการไลฟ์ — ไม่นำมารวมยอด</div>`
      : "";

    Util.openModal(`
      <div class="row between"><h2>${label}</h2><button class="modal-close" id="modal-close-btn">✕</button></div>
      ${statusBanner}
      <div class="row" style="margin-bottom:12px;">
        <button class="${status === "no_live" ? "secondary" : "danger"} small" id="toggle-no-live">
          ${status === "no_live" ? "↩ ยกเลิกสถานะไม่ไลฟ์" : "🔴 ทำเครื่องหมายว่าวันนี้ไม่ไลฟ์"}
        </button>
      </div>
      ${rows}
    `);
    document.getElementById("modal-close-btn").addEventListener("click", Util.closeModal);
    document.querySelectorAll("[data-streamer]").forEach((el) => {
      const id = el.getAttribute("data-streamer");
      if (!id) return;
      el.addEventListener("click", () => {
        Util.closeModal();
        location.hash = `#streamer/${id}`;
      });
    });
    document.getElementById("toggle-no-live").addEventListener("click", () => {
      DB.setDayStatus(dateISO, status === "no_live" ? "normal" : "no_live");
      refreshBackground();
      openDayModal(dateISO);
    });
    document.querySelectorAll("[data-toggle-tournament]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const entryId = btn.getAttribute("data-toggle-tournament");
        const entry = DB.listSchedule().find((e) => e.id === entryId);
        DB.setEntryTournament(entryId, !entry.isTournament);
        refreshBackground();
        openDayModal(dateISO);
      });
    });
  }

  return { render };
})();


// Real-time "who's live right now" board — embeds each game's official YouTube channel
// live player directly (no API key needed) during its scheduled window. Outside a scheduled
// window we skip the embed and show our own "not live yet / next up" card instead of
// YouTube's raw "video unavailable" error, using the schedule data we already have.
const LiveStream = (() => {
  function frameUrl(channelId) {
    return `https://www.youtube.com/embed/live_stream?channel=${channelId}&autoplay=0&_=${Date.now()}`;
  }

  function nowMinutesBangkok() {
    const parts = new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Bangkok", hour: "2-digit", minute: "2-digit", hour12: false,
    }).formatToParts(new Date());
    const h = Number(parts.find((p) => p.type === "hour").value);
    const m = Number(parts.find((p) => p.type === "minute").value);
    return h * 60 + m;
  }

  function parseTimeRange(rangeStr) {
    const parts = (rangeStr || "").split("-").map((s) => s.trim());
    if (parts.length !== 2) return null;
    const toMin = (t) => {
      const m = t.match(/^(\d{1,2})\.(\d{2})$/);
      if (!m) return null;
      return Number(m[1]) * 60 + Number(m[2]);
    };
    const start = toMin(parts[0]);
    const end = toMin(parts[1]);
    if (start === null || end === null) return null;
    return { start, end };
  }

  function isRangeActive(range, nowMin) {
    if (range.end >= range.start) return nowMin >= range.start && nowMin < range.end;
    return nowMin >= range.start || nowMin < range.end; // wraps past midnight
  }

  // For a game: finds the entry currently in its scheduled window today (if any),
  // and the next upcoming one today (for the "not live yet" card).
  function gameScheduleStatus(gameId) {
    const nowMin = nowMinutesBangkok();
    const todayEntries = DB.listScheduleByDate(Util.todayISO())
      .filter((e) => e.gameId === gameId)
      .sort((a, b) => a.time.localeCompare(b.time));

    let current = null;
    let next = null;
    todayEntries.forEach((e) => {
      const range = parseTimeRange(e.time);
      if (!range) return;
      if (!current && isRangeActive(range, nowMin)) current = e;
      if (!next && range.start > nowMin) next = e;
    });
    return { current, next };
  }

  function renderTileBody(g) {
    const status = gameScheduleStatus(g.id);
    if (status.current) {
      return `<div class="live-embed-wrap">
        <iframe id="live-frame-${g.id}" src="${frameUrl(g.channelId)}" allow="autoplay; encrypted-media" allowfullscreen loading="lazy" frameborder="0"></iframe>
      </div>`;
    }
    const s = status.next ? DB.getStreamer(status.next.streamerId) : null;
    return `<div class="live-embed-wrap live-placeholder">
      <div class="live-placeholder-inner">
        <div class="live-placeholder-icon">⏳</div>
        <div class="live-placeholder-title">ยังไม่ถึงเวลาไลฟ์</div>
        ${status.next
          ? `<div class="live-placeholder-next">รอบถัดไปวันนี้ ${Util.escapeHtml(status.next.time)}${s ? ` — ${Util.escapeHtml(s.name)}` : ""}</div>`
          : `<div class="live-placeholder-next">ไม่มีคิวไลฟ์วันนี้แล้ว</div>`}
      </div>
    </div>`;
  }

  function render(container) {
    const allGames = DB.listGames();
    const withChannel = allGames.filter((g) => g.channelId);
    const missing = allGames.filter((g) => !g.channelId);

    container.innerHTML = `
      <div class="card">
        <div class="row between">
          <h2>📡 ไลฟ์สดตอนนี้ — ทุกเกม</h2>
          <button class="secondary small" id="live-refresh-all">🔄 รีเฟรชทั้งหมด</button>
        </div>
        <p style="color:var(--text-dim);font-size:12px;">ช่วงที่มีคิวไลฟ์ตามตารางจะขึ้นภาพสดให้อัตโนมัติ ช่วงที่ไม่มีคิวจะโชว์รอบถัดไปแทน</p>
      </div>
      ${withChannel.length ? `<div class="live-grid">
        ${withChannel.map((g) => `
          <div class="live-tile">
            <div class="live-tile-header" style="border-left-color:${g.color};">
              <span class="color-dot" style="background:${g.color}"></span>
              <strong>${Util.escapeHtml(g.fullName)}</strong>
              ${g.youtubeUrl ? `<a href="${Util.escapeHtml(g.youtubeUrl)}" target="_blank" rel="noopener" class="live-open-link">เปิดใน YouTube ↗</a>` : ""}
            </div>
            ${renderTileBody(g)}
          </div>
        `).join("")}
      </div>` : `<div class="card empty-state">ยังไม่ได้ตั้ง Channel ID ให้เกมไหนเลย — ไปตั้งได้ที่หลังบ้าน &gt; เกม</div>`}
      ${missing.length ? `<div class="card"><p style="color:var(--text-dim);font-size:12px;">ยังไม่ได้ตั้ง Channel ID: ${missing.map((g) => Util.escapeHtml(g.name)).join(", ")} — ไปตั้งได้ที่หลังบ้าน &gt; เกม</p></div>` : ""}
    `;

    container.querySelector("#live-refresh-all").addEventListener("click", () => {
      render(container);
      Util.showToast("รีเฟรชแล้ว");
    });
  }

  return { render };
})();


const StreamerView = (() => {
  function render(container, streamerId) {
    const s = DB.getStreamer(streamerId);
    if (!s) {
      container.innerHTML = `<div class="card empty-state">ไม่พบ Streamer นี้</div>`;
      return;
    }
    const availability = s.availability || { timeSlots: [], days: [] };
    const priceRows = s.prices.map((p) => {
      const g = DB.getGame(p.gameId);
      const hasDiscount = p.discountPrice !== null && p.discountPrice !== undefined && p.discountPrice !== "";
      return `<tr>

          <tbody>${priceRows}</tbody>
        </table>` : `<div class="empty-state">ยังไม่มีข้อมูลเกม/ราคา — เพิ่มได้ในหลังบ้าน</div>`}
      </div>

      <div class="card">
        <h3>ช่วงเวลาที่สะดวก</h3>
        ${(availability.timeSlots.length || availability.days.length) ? `
          <div class="row" style="gap:6px;margin-bottom:8px;">
            ${availability.timeSlots.length ? Util.TIME_SLOTS.map((t) => {
              const isAvail = availability.timeSlots.includes(t.key);
              return `<span class="badge" style="background:${isAvail ? "var(--success)" : "rgba(192,57,43,0.12)"};color:${isAvail ? "white" : "var(--danger)"};border:1px solid ${isAvail ? "var(--success)" : "var(--danger)"};">${Util.escapeHtml(t.label)}</span>`;
            }).join("") : `<span style="color:var(--text-dim);font-size:12px;">ยังไม่ระบุช่วงเวลา</span>`}
          </div>
          <div class="row" style="gap:6px;">
            ${availability.days.length ? Util.AVAIL_DAYS.map((d) => {
              const isAvail = availability.days.includes(d.key);
              return `<span class="badge" style="background:${isAvail ? "var(--success)" : "rgba(192,57,43,0.12)"};color:${isAvail ? "white" : "var(--danger)"};border:1px solid ${isAvail ? "var(--success)" : "var(--danger)"};">${Util.escapeHtml(d.label)}</span>`;
            }).join("") : `<span style="color:var(--text-dim);font-size:12px;">ยังไม่ระบุวัน</span>`}
          </div>
        ` : `<div class="empty-state">ยังไม่มีข้อมูลช่วงเวลาที่สะดวก — เพิ่มได้ในหลังบ้าน</div>`}
      </div>

      <div class="card">
        <h3>คิวไลฟ์ที่จะถึง</h3>
        ${upcoming.length ? upcoming.map((e) => {
          const g = DB.getGame(e.gameId);
          const status = DB.getDayStatus(e.date);
          return `<div class="session-row">
            <span class="badge" style="background:${g ? g.color : "#666"}">${g ? Util.escapeHtml(g.name) : "?"}</span>
            <span class="time">${e.date}</span>
            <span>${Util.escapeHtml(e.time)}</span>
            ${status === "no_live" ? `<span class="status-tag no_live">ไม่ไลฟ์</span>` : e.isTournament ? `<span class="status-tag tournament">🏆 ทัวร์นาเมนต์</span>` : ""}
          </div>`;
        }).join("") : `<div class="empty-state">ไม่มีคิวที่จะถึง</div>`}
      </div>
    `;

    container.querySelector("#back-btn").addEventListener("click", () => history.back());
    container.querySelector("#edit-in-admin").addEventListener("click", () => {
      location.hash = `#admin/streamers/${s.id}`;
    });
  }

  return { render };
})();


const Summary = (() => {
  let state = { year: null, month: null };
  const MANAGEMENT_FEE_RATE = 0.15;
  const VAT_RATE = 0.07;

  // Client invoice: normal (non-discounted) rate as the base, plus management fee margin, plus VAT on top.
  function computeInvoice(normalTotal) {
    const managementFee = normalTotal * MANAGEMENT_FEE_RATE;
    const beforeVat = normalTotal + managementFee;
    const vat = beforeVat * VAT_RATE;
    const grandTotal = beforeVat + vat;
    return { normalTotal, managementFee, beforeVat, vat, grandTotal };
  }

  function init() {
    if (!state.year) {
      const now = new Date();
      state.year = now.getFullYear();
      state.month = now.getMonth() + 1;
    }
  }

  // Excludes "no_live" days entirely. "tournament" days count as a job but cost 0 (streamer works free).
  function computeMonthSummary(year, month) {
    const entries = DB.listScheduleByMonth(year, month);
    const byGame = {};
    let normalTotal = 0, actualTotal = 0, jobCount = 0;

    entries.forEach((e) => {
      const cost = DB.getEntryCost(e);
      if (cost.excluded) return;

      const g = DB.getGame(e.gameId);
      const s = DB.getStreamer(e.streamerId);
      if (!g || !s) return;

      const normal = cost.normal;
      const actual = cost.actual;

      if (!byGame[g.id]) byGame[g.id] = { game: g, jobCount: 0, normalTotal: 0, actualTotal: 0, streamers: {} };
      const gb = byGame[g.id];
      gb.jobCount++;
      gb.normalTotal += normal;
      gb.actualTotal += actual;

      if (!gb.streamers[s.id]) gb.streamers[s.id] = { streamer: s, jobCount: 0, normalTotal: 0, actualTotal: 0 };
      const sb = gb.streamers[s.id];
      sb.jobCount++;
      sb.normalTotal += normal;
      sb.actualTotal += actual;

      normalTotal += normal;
      actualTotal += actual;
      jobCount++;
    });

    return { byGame, normalTotal, actualTotal, jobCount, savings: normalTotal - actualTotal };
  }

  function render(container) {
    init();
    const summary = computeMonthSummary(state.year, state.month);
    const invoice = computeInvoice(summary.normalTotal);
    const monthTitle = `${Util.MONTH_NAMES_TH[state.month - 1]} ${state.year + 543}`;

    const gameSections = Object.values(summary.byGame)
      .sort((a, b) => b.actualTotal - a.actualTotal)
      .map((gb) => {
        const streamerRows = Object.values(gb.streamers)
          .sort((a, b) => b.actualTotal - a.actualTotal)
          .map((sb) => `<tr>
            <td>${Util.escapeHtml(sb.streamer.name)}</td>
            <td>${sb.jobCount}</td>
            <td>฿${Util.fmtMoney(sb.normalTotal)}</td>
            <td>฿${Util.fmtMoney(sb.actualTotal)}</td>
          </tr>`).join("");
        const gbInvoice = computeInvoice(gb.normalTotal);
        return `<details class="game-summary">
          <summary>
            <span class="color-dot" style="background:${gb.game.color}"></span>
            ${Util.escapeHtml(gb.game.name)}
            <span class="gs-totals">
              <span>งาน: ${gb.jobCount}</span>
              <span>ปกติ: ฿${Util.fmtMoney(gb.normalTotal)}</span>
              <span>จ่ายจริง: ฿${Util.fmtMoney(gb.actualTotal)}</span>
              <span>ลูกค้าจ่าย: ฿${Util.fmtMoney(gbInvoice.grandTotal)}</span>
            </span>
          </summary>
          <table style="margin-top:10px;">
            <tbody>
              <tr><td>ยอดราคาปกติ (Streamer)</td><td style="text-align:right;">฿${Util.fmtMoney(gbInvoice.normalTotal)}</td></tr>
              <tr><td>Management Fee (${(MANAGEMENT_FEE_RATE * 100).toFixed(0)}%)</td><td style="text-align:right;">฿${Util.fmtMoney(gbInvoice.managementFee)}</td></tr>
              <tr><td>รวมก่อน VAT</td><td style="text-align:right;">฿${Util.fmtMoney(gbInvoice.beforeVat)}</td></tr>
              <tr><td>VAT (${(VAT_RATE * 100).toFixed(0)}%)</td><td style="text-align:right;">฿${Util.fmtMoney(gbInvoice.vat)}</td></tr>
              <tr><td><strong>ยอดเรียกเก็บลูกค้า (เกมนี้)</strong></td><td style="text-align:right;"><strong>฿${Util.fmtMoney(gbInvoice.grandTotal)}</strong></td></tr>
            </tbody>
          </table>
          <table style="margin-top:14px;">
            <thead><tr><th>Streamer</th><th>จำนวนงาน</th><th>ราคาปกติรวม</th><th>ราคาจ่ายจริงรวม</th></tr></thead>
            <tbody>${streamerRows}</tbody>
          </table>
        </details>`;
      }).join("");

    container.innerHTML = `
      <div class="card">
        <div class="row between">
          <div class="month-select">
            <button class="secondary small" id="sm-prev">‹</button>
            <div class="cal-title">${monthTitle}</div>
            <button class="secondary small" id="sm-next">›</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>สรุปรวมทั้งเดือน</h2>
        <div class="stat-grid">
          <div class="stat-tile"><div class="label">ยอดรวมราคาปกติ</div><div class="value">฿${Util.fmtMoney(summary.normalTotal)}</div></div>
          <div class="stat-tile"><div class="label">ยอดรวมที่จ่ายจริง</div><div class="value">฿${Util.fmtMoney(summary.actualTotal)}</div></div>
          <div class="stat-tile savings"><div class="label">ประหยัดได้</div><div class="value">฿${Util.fmtMoney(summary.savings)}</div></div>
          <div class="stat-tile"><div class="label">จำนวนงานทั้งหมด</div><div class="value">${summary.jobCount}</div></div>
        </div>
      </div>

      <div class="card">
        <h2>ยอดเรียกเก็บลูกค้า</h2>
        <table>
          <tbody>
            <tr><td>ยอดราคาปกติ (Streamer)</td><td style="text-align:right;">฿${Util.fmtMoney(invoice.normalTotal)}</td></tr>
            <tr><td>Management Fee (${(MANAGEMENT_FEE_RATE * 100).toFixed(0)}%)</td><td style="text-align:right;">฿${Util.fmtMoney(invoice.managementFee)}</td></tr>
            <tr><td><strong>รวมก่อน VAT</strong></td><td style="text-align:right;"><strong>฿${Util.fmtMoney(invoice.beforeVat)}</strong></td></tr>
            <tr><td>VAT (${(VAT_RATE * 100).toFixed(0)}%)</td><td style="text-align:right;">฿${Util.fmtMoney(invoice.vat)}</td></tr>
            <tr><td style="font-size:15px;"><strong>ยอดเรียกเก็บลูกค้าทั้งหมด</strong></td><td style="text-align:right;font-size:15px;color:var(--success);"><strong>฿${Util.fmtMoney(invoice.grandTotal)}</strong></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2>สรุปแยกตามเกม</h2>
        ${gameSections || `<div class="empty-state">ไม่มีข้อมูลคิวไลฟ์ในเดือนนี้</div>`}
      </div>
    `;

    container.querySelector("#sm-prev").addEventListener("click", () => shift(-1, container));
    container.querySelector("#sm-next").addEventListener("click", () => shift(1, container));
  }

  function shift(dir, container) {
    state.month += dir;
    if (state.month > 12) { state.month = 1; state.year++; }
    if (state.month < 1) { state.month = 12; state.year--; }
    render(container);
  }

  return { render, computeMonthSummary };
})();


const Admin = (() => {
  let state = { tab: "streamers", editingStreamerId: null, streamerSearch: "", streamerGameFilter: "", streamerTimeFilter: "" };

  function render(container, subroute) {
    if (subroute && subroute[0] === "streamers" && subroute[1]) {
      state.tab = "streamers";
      state.editingStreamerId = subroute[1];
    }
    container.innerHTML = `
      <div class="admin-tabs">
        <button data-tab="streamers" class="${state.tab === "streamers" ? "active" : ""}">Streamers</button>
        <button data-tab="games" class="${state.tab === "games" ? "active" : ""}">เกม</button>
      </div>
      <div id="admin-body"></div>
    `;
    container.querySelectorAll(".admin-tabs button").forEach((b) => {
      b.addEventListener("click", () => {
        state.tab = b.getAttribute("data-tab");
        if (state.tab !== "streamers") state.editingStreamerId = null;
        container.querySelectorAll(".admin-tabs button").forEach((btn) => {
          btn.classList.toggle("active", btn.getAttribute("data-tab") === state.tab);
        });
        renderBody(container);
      });
    });
    renderBody(container);
  }

  function renderBody(container) {
    const body = container.querySelector("#admin-body");
    if (state.tab === "streamers") renderStreamers(body);
    else if (state.tab === "games") renderGames(body);
  }

  // ---------------- Streamers ----------------
  function renderStreamers(body) {
    const allStreamers = DB.listStreamers().slice().sort((a, b) => a.name.localeCompare(b.name));
    const games = DB.listGames();
    const searchLower = state.streamerSearch.trim().toLowerCase();
    const streamers = allStreamers.filter((s) => {
      if (searchLower && !s.name.toLowerCase().includes(searchLower)) return false;
      if (state.streamerGameFilter && !s.prices.some((p) => p.gameId === state.streamerGameFilter)) return false;
      if (state.streamerTimeFilter) {
        const avail = s.availability || { timeSlots: [] };
        if (!avail.timeSlots.includes(state.streamerTimeFilter)) return false;
      }
      return true;
    });
    const filtersActive = searchLower || state.streamerGameFilter || state.streamerTimeFilter;
    body.innerHTML = `
      <div class="card">
        <div class="row between">
          <h2>Streamers (${streamers.length}${filtersActive ? ` / ${allStreamers.length}` : ""})</h2>
          <button id="add-streamer">+ เพิ่ม Streamer</button>
        </div>
        <div class="row" style="gap:8px;margin-bottom:14px;flex-wrap:wrap;">
          <input type="text" id="streamer-search" placeholder="ค้นหาชื่อ Streamer..." value="${Util.escapeHtml(state.streamerSearch)}" style="flex:1;min-width:180px;">
          <select id="streamer-game-filter">
            <option value="">ทุกเกม</option>
            ${games.map((g) => `<option value="${g.id}" ${state.streamerGameFilter === g.id ? "selected" : ""}>${Util.escapeHtml(g.name)}</option>`).join("")}
          </select>
          <select id="streamer-time-filter">
            <option value="">ทุกช่วงเวลา</option>
            ${Util.TIME_SLOTS.map((t) => `<option value="${t.key}" ${state.streamerTimeFilter === t.key ? "selected" : ""}>${t.label}</option>`).join("")}
          </select>
        </div>
        <div style="overflow-x:auto;">
        <table>
          <thead><tr><th></th><th>ชื่อ</th><th>เกม &amp; ราคา</th><th>ช่วงเวลาที่สะดวก</th><th>วันที่สะดวก</th><th></th></tr></thead>
          <tbody>
            ${streamers.length === 0 ? `<tr><td colspan="6"><div class="empty-state">ไม่พบ Streamer ที่ตรงกับตัวกรอง</div></td></tr>` : ""}
            ${streamers.map((s) => {
              const row = `<tr>
                <td>${Util.avatarHTML(s, "tiny")}</td>
                <td style="white-space:nowrap;">${Util.escapeHtml(s.name)}</td>
                <td>${gamePriceCell(s)}</td>
                <td style="white-space:nowrap;">${timeSlotCell(s)}</td>
                <td style="white-space:nowrap;">${dayCell(s)}</td>
                <td class="row" style="gap:6px;">
                  <button class="secondary small" data-edit="${s.id}">แก้ไข</button>
                  <button class="danger small" data-del="${s.id}">ลบ</button>
                </td>
              </tr>`;
              const editorRow = state.editingStreamerId === s.id
                ? `<tr class="editor-row" id="editor-row-${s.id}"><td colspan="6">${renderStreamerEditor(s)}</td></tr>`
                : "";
              return row + editorRow;
            }).join("")}
          </tbody>
        </table>
        </div>
      </div>
    `;

    body.querySelector("#streamer-search").addEventListener("input", (e) => {
      state.streamerSearch = e.target.value;
      const cursorPos = e.target.selectionStart;
      renderBody(body.closest("main"));
      const newInput = body.querySelector("#streamer-search");
      if (newInput) { newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
    });
    body.querySelector("#streamer-game-filter").addEventListener("change", (e) => {
      state.streamerGameFilter = e.target.value;
      renderBody(body.closest("main"));
    });
    body.querySelector("#streamer-time-filter").addEventListener("change", (e) => {
      state.streamerTimeFilter = e.target.value;
      renderBody(body.closest("main"));
    });
    body.querySelector("#add-streamer").addEventListener("click", () => {
      const name = prompt("ชื่อ Streamer:");
      if (!name || !name.trim()) return;
      const s = DB.addStreamer(name.trim());
      state.editingStreamerId = s.id;
      renderBody(body.closest("main"));
      Util.showToast("เพิ่ม Streamer แล้ว");
    });
    body.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => {
      state.editingStreamerId = b.getAttribute("data-edit");
      renderBody(body.closest("main"));
      const row = body.querySelector(`#editor-row-${state.editingStreamerId}`);
      if (row) row.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }));
    body.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => {
      const id = b.getAttribute("data-del");
      const s = DB.getStreamer(id);
      if (!confirm(`ลบ Streamer "${s.name}" และคิวไลฟ์ที่เกี่ยวข้องทั้งหมด?`)) return;
      DB.deleteStreamer(id);
      if (state.editingStreamerId === id) state.editingStreamerId = null;
      renderBody(body.closest("main"));
      Util.showToast("ลบแล้ว");
    }));

    if (state.editingStreamerId) attachStreamerEditorEvents(body);
  }

  function gamePriceCell(s) {
    if (!s.prices.length) return `<span style="color:var(--text-dim);font-size:12px;">—</span>`;
    return s.prices.map((p) => {
      const g = DB.getGame(p.gameId);
      const hasDiscount = p.discountPrice !== null && p.discountPrice !== undefined && p.discountPrice !== "";
      const priceText = hasDiscount
        ? `฿${Util.fmtMoney(p.normalPrice)} → <strong style="color:var(--success);">฿${Util.fmtMoney(p.discountPrice)}</strong>`
        : `฿${Util.fmtMoney(p.normalPrice)}`;
      return `<div style="white-space:nowrap;margin-bottom:2px;"><span class="badge" style="background:${g ? g.color : "#666"};margin-right:6px;">${g ? Util.escapeHtml(g.name) : "?"}</span><span style="font-size:12px;">${priceText}</span></div>`;
    }).join("");

    return Util.TIME_SLOTS.map((t) => {
      const isAvail = avail.timeSlots.includes(t.key);

    if (!avail.days.length) return `<span style="color:var(--text-dim);font-size:12px;">—</span>`;
    return Util.AVAIL_DAYS.map((d) => {

      return `<span class="badge" style="background:${isAvail ? "var(--success)" : "rgba(192,57,43,0.12)"};color:${isAvail ? "white" : "var(--danger)"};border:1px solid ${isAvail ? "var(--success)" : "var(--danger)"};margin-right:3px;">${d.label}</span>`;
    }).join("");

  function renderStreamerEditor(s) {

    return `
      <div class="card editor-card" id="streamer-editor">
        <div class="row between"><h2>แก้ไข: ${Util.escapeHtml(s.name)}</h2><button class="modal-close" id="close-editor">✕</button></div>

        <div class="photo-upload-row">
          ${Util.avatarHTML(s, "large")}

            <label>รูปภาพ Streamer (อัปโหลดจากเครื่อง หรือวางลิงก์รูปภาพ)</label>

        <h3>เกม &amp; ราคา</h3>
        <table>
          <thead><tr><th>เกม</th><th>ราคาปกติ</th><th>ราคาพิเศษ (ถ้ามี)</th><th></th></tr></thead>
          <tbody>
            ${s.prices.map((p) => {
              const g = DB.getGame(p.gameId);
              return `<tr>
                <td><span class="badge" style="background:${g ? g.color : "#666"}">${g ? Util.escapeHtml(g.name) : "?"}</span></td>

                <td><button class="danger small" data-del-price="${p.gameId}">ลบ</button></td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>

        ${availableGames.length ? `
        <div class="row" style="margin-top:12px;">
          <select id="new-price-game">
            ${availableGames.map((g) => `<option value="${g.id}">${Util.escapeHtml(g.name)}</option>`).join("")}
          </select>
          <button id="add-price-row" class="secondary">+ เพิ่มเกม</button>
        </div>` : ""}

        <h3 style="margin-top:20px;">ช่วงเวลาที่สะดวก</h3>
        <div class="avail-day-row">
          ${Util.TIME_SLOTS.map((t) => `<button type="button" class="avail-day-chip ${avail.timeSlots.includes(t.key) ? "active" : ""}" data-slot="${t.key}">${t.label}</button>`).join("")}
        </div>

        <h3 style="margin-top:16px;">วันที่สะดวก</h3>
        <div class="avail-day-row">
          ${Util.AVAIL_DAYS.map((d) => `<button type="button" class="avail-day-chip ${avail.days.includes(d.key) ? "active" : ""}" data-day="${d.key}">${d.label}</button>`).join("")}
        </div>

        <div class="row" style="margin-top:16px;">
          <button id="save-streamer">บันทึก</button>
        </div>
      </div>
    `;
  }

  // Saves whatever is currently sitting in the name/price/availability fields, so that any
  // action which re-renders the editor (photo change, add/remove a price row, etc.) never
  // silently discards edits the admin hasn't clicked "บันทึก" for yet.
  function commitDraft(editor) {
    const name = editor.querySelector("#streamer-name").value.trim();
    const timeSlots = Array.from(editor.querySelectorAll("[data-slot].active")).map((el) => el.getAttribute("data-slot"));
    const days = Array.from(editor.querySelectorAll("[data-day].active")).map((el) => el.getAttribute("data-day"));
    const patch = { availability: { timeSlots, days } };
    if (name) patch.name = name;
    DB.updateStreamer(state.editingStreamerId, patch);
    editor.querySelectorAll(".price-normal").forEach((inp) => {
      const gameId = inp.getAttribute("data-game");
      const normal = Number(inp.value) || 0;
      const discInp = editor.querySelector(`.price-discount[data-game="${gameId}"]`);
      const disc = discInp.value === "" ? null : Number(discInp.value);
      DB.setPrice(state.editingStreamerId, gameId, normal, disc);
    });
  }

  function attachStreamerEditorEvents(body) {
    const editor = body.querySelector("#streamer-editor");
    if (!editor) return;
    editor.querySelector("#close-editor").addEventListener("click", () => {
      state.editingStreamerId = null;
      renderBody(body.closest("main"));
    });
    const photoFile = editor.querySelector("#streamer-photo-file");
    if (photoFile) photoFile.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 1500000) { alert("ไฟล์รูปใหญ่เกินไป กรุณาใช้ไฟล์ไม่เกิน ~1.5MB"); return; }
      const reader = new FileReader();
      reader.onload = () => {
        commitDraft(editor);
        DB.updateStreamer(state.editingStreamerId, { photo: reader.result });
        renderBody(body.closest("main"));
        Util.showToast("อัปเดตรูปภาพแล้ว");
      };
      reader.readAsDataURL(file);
    });
    const photoUrl = editor.querySelector("#streamer-photo-url");
    if (photoUrl) photoUrl.addEventListener("change", () => {
      const val = photoUrl.value.trim();
      if (!val) return;
      commitDraft(editor);
      DB.updateStreamer(state.editingStreamerId, { photo: val });
      renderBody(body.closest("main"));
      Util.showToast("อัปเดตรูปภาพแล้ว");
    });
    const removePhoto = editor.querySelector("#remove-photo");
    if (removePhoto) removePhoto.addEventListener("click", () => {
      commitDraft(editor);
      DB.updateStreamer(state.editingStreamerId, { photo: null });
      renderBody(body.closest("main"));
      Util.showToast("ลบรูปแล้ว");
    });
    editor.querySelectorAll(".avail-day-chip").forEach((chip) => chip.addEventListener("click", () => {
      chip.classList.toggle("active");
    }));
    const addBtn = editor.querySelector("#add-price-row");
    if (addBtn) addBtn.addEventListener("click", () => {
      commitDraft(editor);
      const gameId = editor.querySelector("#new-price-game").value;
      DB.setPrice(state.editingStreamerId, gameId, 0, null);
      renderBody(body.closest("main"));
    });
    editor.querySelectorAll("[data-del-price]").forEach((b) => b.addEventListener("click", () => {
      commitDraft(editor);
      DB.deletePrice(state.editingStreamerId, b.getAttribute("data-del-price"));
      renderBody(body.closest("main"));
      Util.showToast("ลบราคาแล้ว");
    }));
    editor.querySelector("#save-streamer").addEventListener("click", () => {
      commitDraft(editor);
      Util.showToast("บันทึกแล้ว — Dashboard และหน้าสรุปอัปเดตอัตโนมัติ");
      renderBody(body.closest("main"));
    });
  }

  // ---------------- Games ----------------
  function renderGames(body) {
    const games = DB.listGames();
    body.innerHTML = `
      <div class="card">
        <div class="row between"><h2>เกม (${games.length})</h2><button id="add-game">+ เพิ่มเกม</button></div>
        <div style="overflow-x:auto;">
        <p style="color:var(--text-dim);font-size:12px;margin-top:-4px;">Channel ID ใช้สำหรับหน้า "ไลฟ์สด" (แสดงภาพสดจริง) — ถ้าไม่รู้ Channel ID ส่งลิงก์ช่อง YouTube มาให้ทีมพัฒนาหาให้ได้</p>
        <table>
          <thead><tr><th>สี</th><th>ชื่อย่อ</th><th>ชื่อเต็ม</th><th>ช่องไลฟ์ (YouTube)</th><th>Channel ID</th><th></th></tr></thead>
          <tbody>
            ${games.map((g) => `<tr data-row="${g.id}">
              <td><input type="color" class="g-color" data-id="${g.id}" value="${g.color}" style="width:40px;padding:2px;"></td>
              <td><input class="g-name" data-id="${g.id}" value="${Util.escapeHtml(g.name)}" style="width:140px;"></td>
              <td><input class="g-fullname" data-id="${g.id}" value="${Util.escapeHtml(g.fullName)}" style="width:200px;"></td>
              <td><input class="g-youtube" data-id="${g.id}" value="${g.youtubeUrl ? Util.escapeHtml(g.youtubeUrl) : ""}" placeholder="https://www.youtube.com/@channel/streams" style="width:260px;"></td>
              <td><input class="g-channelid" data-id="${g.id}" value="${g.channelId ? Util.escapeHtml(g.channelId) : ""}" placeholder="UCxxxxxxxxxxxxxxxxxxxxxx" style="width:220px;"></td>
              <td><button class="secondary small" data-save="${g.id}">บันทึก</button></td>
            </tr>`).join("")}
          </tbody>
        </table>
        </div>
      </div>
    `;
    body.querySelector("#add-game").addEventListener("click", () => {
      const name = prompt("ชื่อย่อเกม (เช่น TOSM):");
      if (!name || !name.trim()) return;
      DB.addGame({ name: name.trim(), fullName: name.trim(), color: "#6366f1" });
      renderBody(body.closest("main"));
      Util.showToast("เพิ่มเกมแล้ว");
    });
    body.querySelectorAll("[data-save]").forEach((btn) => btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-save");
      const row = body.querySelector(`tr[data-row="${id}"]`);
      const youtubeUrl = row.querySelector(".g-youtube").value.trim();
      const channelId = row.querySelector(".g-channelid").value.trim();
      DB.updateGame(id, {
        color: row.querySelector(".g-color").value,
        name: row.querySelector(".g-name").value.trim(),
        fullName: row.querySelector(".g-fullname").value.trim(),
        youtubeUrl: youtubeUrl || null,
        channelId: channelId || null,
      });
      Util.showToast("บันทึกแล้ว — Dashboard และหน้าสรุปอัปเดตอัตโนมัติ");
      renderBody(body.closest("main"));
    }));
  }

  return { render };
})();


(async function () {
  await DB.load();

  const app = document.getElementById("app");

  const logoutLink = document.getElementById("nav-logout");

  function setActiveNav(route) {
    document.querySelectorAll("#nav-tabs a[data-route]").forEach((a) => {
      a.classList.toggle("active", a.getAttribute("data-route") === route);
    });
    logoutLink.style.display = Auth.isAuthed() ? "" : "none";
  }

  function router() {
    const hash = location.hash.replace(/^#/, "") || "dashboard";
    const parts = hash.split("/");
    const route = parts[0];

    if (route === "dashboard") {
      setActiveNav("dashboard");
      Calendar.render(app);
    } else if (route === "live") {
      setActiveNav("live");
      LiveStream.render(app);
    } else if (route === "summary") {
      setActiveNav("summary");
      if (Auth.isAuthed()) Summary.render(app);
      else Auth.renderLogin(app, () => { setActiveNav("summary"); Summary.render(app); });
    } else if (route === "admin") {
      setActiveNav("admin");
      if (Auth.isAuthed()) Admin.render(app, parts.slice(1));
      else Auth.renderLogin(app, () => { setActiveNav("admin"); Admin.render(app, parts.slice(1)); });
    } else if (route === "streamer" && parts[1]) {
      setActiveNav("");
      StreamerView.render(app, parts[1]);
    } else {
      setActiveNav("dashboard");
      Calendar.render(app);
    }
  }

  logoutLink.addEventListener("click", (e) => {
    e.preventDefault();
    Auth.logout();
    location.hash = "#dashboard";
    router();
  });

  window.addEventListener("hashchange", router);
  router();
})();

</script>
</body>
